name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer
          extensions: pdo_mysql, apcu

      - name: Validate composer
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Upload vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendor-php85
          path: vendor
          if-no-files-found: error

  phpstan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer
          extensions: pdo_mysql, apcu

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor-php85
          path: vendor

      - name: Restore executable permissions for vendor binaries
        run: find vendor/bin -type f -exec chmod +x {} +

      - name: Run PHPStan
        run: composer stan

  cs-check:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer
          extensions: pdo_mysql, apcu

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor-php85
          path: vendor

      - name: Restore executable permissions for vendor binaries
        run: find vendor/bin -type f -exec chmod +x {} +

      - name: Run CS check
        run: composer cs

  psalm:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer
          extensions: pdo_mysql, apcu

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor-php85
          path: vendor

      - name: Restore executable permissions for vendor binaries
        run: find vendor/bin -type f -exec chmod +x {} +

      - name: Run Psalm
        run: composer psalm

  tests:
    runs-on: ubuntu-latest
    needs: [phpstan, cs-check, psalm]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: packing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psecret"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer
          extensions: pdo_mysql, apcu

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor-php85
          path: vendor

      - name: Restore executable permissions for vendor binaries
        run: find vendor/bin -type f -exec chmod +x {} +

      - name: Map MySQL hostname expected by app
        run: echo "127.0.0.1 shipmonk-packing-mysql" | sudo tee -a /etc/hosts

      - name: Wait for MySQL
        run: |
          for i in {1..60}; do
            if php -r '$pdo = new PDO("mysql:host=127.0.0.1;port=3306", "root", "secret"); $pdo->query("SELECT 1");' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run test suite
        run: composer test

  mutation-testing:
    runs-on: ubuntu-latest
    needs: [phpstan, cs-check, psalm]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: packing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psecret"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          tools: composer
          coverage: xdebug
          extensions: pdo_mysql, apcu

      - name: Download vendor artifact
        uses: actions/download-artifact@v4
        with:
          name: vendor-php85
          path: vendor

      - name: Restore executable permissions for vendor binaries
        run: find vendor/bin -type f -exec chmod +x {} +

      - name: Map MySQL hostname expected by app
        run: echo "127.0.0.1 shipmonk-packing-mysql" | sudo tee -a /etc/hosts

      - name: Wait for MySQL
        run: |
          for i in {1..60}; do
            if php -r '$pdo = new PDO("mysql:host=127.0.0.1;port=3306", "root", "secret"); $pdo->query("SELECT 1");' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run infection
        env:
          XDEBUG_MODE: coverage
        run: composer infection
